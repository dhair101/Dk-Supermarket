<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>DK Supermarket Belize</title>

<style>
body {
  margin: 0;
  font-family: Arial, sans-serif;
  background: #0f0f0f;
  color: #fff;
}

/* HEADER */
header {
  background: #111;
  padding: 15px;
  text-align: center;
  border-bottom: 1px solid #222;
}

.logo {
  font-size: 26px;
  font-weight: 800;
  color: #25D366;
  letter-spacing: 2px;
}

/* SEARCH */
.search-box {
  padding: 15px;
  text-align: center;
}

.search-box input {
  width: 90%;
  max-width: 400px;
  padding: 12px;
  border-radius: 6px;
  border: none;
  font-size: 16px;
}

/* CATEGORY */
.section {
  padding: 20px;
}

.section h2 {
  margin-bottom: 10px;
}

/* PRODUCT GRID */
.grid {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(140px, 1fr));
  gap: 15px;
}

.card {
  background: #1a1a1a;
  border-radius: 10px;
  overflow: hidden;
  transition: 0.3s;
}

.card:hover {
  transform: scale(1.05);
}

.card img {
  width: 100%;
  height: 120px;
  object-fit: cover;
}

.card p {
  padding: 10px;
  font-size: 14px;
}

/* TRUST */
.trust {
  padding: 20px;
}

.trust-box {
  background: #1a1a1a;
  margin: 10px 0;
  padding: 15px;
  border-radius: 8px;
}

/* WHATSAPP */
.whatsapp {
  position: fixed;
  bottom: 20px;
  right: 20px;
  background: #25D366;
  padding: 14px;
  border-radius: 50%;
}

.whatsapp img {
  width: 28px;
}

/* FOOTER */
footer {
  text-align: center;
  padding: 20px;
  background: #111;
  color: #aaa;
}
</style>
</head>

<body>

<header>
  <div class="logo">DK SUPERMARKET</div>
</header>

<div class="search-box">
  <input type="text" id="search" placeholder="Search products..." onkeyup="searchProducts()">
</div>

<!-- GROCERIES -->
<div class="section">
  <h2>Groceries</h2>
  <div class="grid" id="products">

    <div class="card"><img src="https://images.unsplash.com/photo-1586201375761-83865001e31c"><p>Rice</p></div>
    <div class="card"><img src="https://images.unsplash.com/photo-1604908176997-431b93f5d1c4"><p>Beans</p></div>
    <div class="card"><img src="https://images.unsplash.com/photo-1589302168068-964664d93dc0"><p>Pasta</p></div>
    <div class="card"><img src="https://images.unsplash.com/photo-1571115764595-644a1f56a55c"><p>Sugar</p></div>

  </div>
</div>

<!-- DRINKS -->
<div class="section">
  <h2>Drinks</h2>
  <div class="grid">

    <div class="card"><img src="https://images.unsplash.com/photo-1580910051074-3eb694886505"><p>Soda</p></div>
    <div class="card"><img src="https://images.unsplash.com/photo-1600275669288-92e4a83b05b4"><p>Juice</p></div>
    <div class="card"><img src="https://images.unsplash.com/photo-1551024709-8f23befc6e67"><p>Water</p></div>

  </div>
</div>

<!-- SNACKS -->
<div class="section">
  <h2>Snacks</h2>
  <div class="grid">

    <div class="card"><img src="https://images.unsplash.com/photo-1585238342024-78d387f4a707"><p>Chips</p></div>
    <div class="card"><img src="https://images.unsplash.com/photo-1604908177225-4a9e0c63c879"><p>Cookies</p></div>
    <div class="card"><img src="https://images.unsplash.com/photo-1585238342024-78d387f4a707"><p>Chocolate</p></div>

  </div>
</div>

<!-- TRUST -->
<div class="trust">
  <h2>Why Shop With Us</h2>
  <div class="trust-box">Wide variety of products available</div>
  <div class="trust-box">Affordable prices for everyday shopping</div>
  <div class="trust-box">Convenient location in Belize</div>
</div>

<footer>
  <p>Belize City, Belize</p>
  <p id="phone">Phone: +501 XXX-XXXX</p>
</footer>

<a class="whatsapp" href="https://wa.me/5010000000">
  <img src="https://cdn-icons-png.flaticon.com/512/733/733585.png">
</a>

<script>
function searchProducts() {
  let input = document.getElementById('search').value.toLowerCase();
  let cards = document.getElementsByClassName('card');

  for (let i = 0; i < cards.length; i++) {
    let text = cards[i].innerText.toLowerCase();
    cards[i].style.display = text.includes(input) ? "block" : "none";
  }
}
</script>

</body>
</html>
